<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 320px; font: 13px -apple-system, system-ui, sans-serif; padding: 12px; color: #1c1c1e; }
      button#save { width: 100%; padding: 9px; font-size: 13px; cursor: pointer; border: 0; border-radius: 6px; background: #6C4CF1; color: #fff; }
      button#save:disabled { opacity: 0.5; cursor: default; }
      #hint { margin-top: 8px; color: #6b6b70; min-height: 16px; }
      ul#jobs { list-style: none; margin: 12px 0 0; padding: 0; max-height: 320px; overflow-y: auto; }
      li.job { padding: 8px 0; border-top: 1px solid #ececf0; display: flex; gap: 8px; align-items: baseline; }
      li.job .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      li.job .state { font-size: 11px; padding: 2px 6px; border-radius: 999px; white-space: nowrap; }
      .st-queued { background: #eee; color: #555; }
      .st-working { background: #ece7ff; color: #6C4CF1; }
      .st-done { background: #e3f5ea; color: #2E9E5B; }
      .st-error { background: #fde8e6; color: #C0392B; }
      .st-cancelled { background: #eee; color: #999; }
      .sub { color: #8a8a90; font-size: 11px; }
      .sub a.cancel { color: #C0392B; }
      .sub a.retry { color: #6C4CF1; }
      a { color: #6C4CF1; text-decoration: none; }
      a:hover { text-decoration: underline; }
      #footer { margin-top: 8px; text-align: right; min-height: 14px; }
      #empty { color: #a0a0a6; margin-top: 12px; }
      .cmd { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
      .cmd code { flex: 1; background: #f4f4f6; border: 1px solid #e2e2e8; border-radius: 4px; padding: 5px 6px; font-size: 11px; font-family: ui-monospace, Menlo, monospace; overflow-x: auto; white-space: nowrap; color: #1c1c1e; }
      .copybtn { border: 0; border-radius: 4px; background: #6C4CF1; color: #fff; padding: 5px 8px; font-size: 11px; cursor: pointer; }
      #bottombar { margin-top: 12px; padding-top: 8px; border-top: 1px solid #ececf0; text-align: right; }
    </style>
  </head>
  <body>
    <button id="save" disabled>Save this video</button>
    <div id="hint">Checking…</div>
    <ul id="jobs"></ul>
    <div id="empty" hidden>No saves yet.</div>
    <div id="footer"></div>
    <div id="bottombar"><a id="optionsLink" href="#">⚙ Options</a></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
